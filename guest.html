<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HCW - Guest Mode</title>
    <style>
        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            background: #0b0f1a; 
            color: #e2e8f0; 
            text-align: center; 
            margin: 0; 
            padding: 10px; 
        }

        .container { max-width: 600px; margin: 0 auto; }

        /* --- HOSPODSKÝ STYL --- */
        .auth-box, .game-screen { 
            background: #161e2d; 
            padding: 20px; 
            border-radius: 12px; 
            border: 1px solid #2d3748; 
            margin-top: 15px;
        }

        .wallet-info { 
            background: #1e293b; 
            padding: 12px; 
            border-radius: 10px; 
            margin-bottom: 15px;
            border-bottom: 2px solid #3b82f6;
            font-size: 18px;
            color: #6ee7b7;
            font-weight: bold;
        }

        input, select { 
            width: 100%; 
            padding: 12px; 
            margin: 8px 0; 
            border-radius: 8px; 
            border: 1px solid #2d3748; 
            background: #0f172a; 
            color: white; 
            box-sizing: border-box; 
            font-size: 16px;
        }

        button { 
            width: 100%; 
            padding: 14px; 
            border: none; 
            border-radius: 8px; 
            background: #3b82f6; 
            color: white; 
            font-weight: bold; 
            cursor: pointer; 
            margin-top: 8px; 
            font-size: 15px;
        }

        .btn-success { background: #059669; }
        .btn-danger { background: #991b1b; }
        .btn-alt { background: #334155; }

        /* OPRAVA KARET - CELÉ ZOBRAZENÍ */
        .card-img {
            width: 90px;
            height: auto;
            border-radius: 4px;
            border: 1px solid #4a5568;
            background: #2d3748;
            display: block;
            margin: 0 auto;
        }

        .player-slot { margin: 5px; display: inline-block; vertical-align: top; width: 100px; }
        
        .pot-box { 
            font-size: 22px; 
            color: #fbbf24; 
            font-weight: bold; 
            padding: 10px; 
            border: 1px dashed #fbbf24; 
            margin-bottom: 15px; 
        }

        .label { font-size: 11px; color: #94a3b8; text-transform: uppercase; margin-bottom: 5px; }

        #log {
            background: rgba(0,0,0,0.3);
            padding: 10px;
            border-radius: 6px;
            margin-top: 15px;
            font-size: 13px;
            text-align: left;
            max-height: 80px;
            overflow-y: auto;
            color: #cbd5e1;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="container">
    <h1 style="color: #3b82f6; text-transform: uppercase; letter-spacing: 2px;">HCW GUEST</h1>

    <div id="setupScreen" class="auth-box">
        <input type="text" id="nickInput" placeholder="Tvůj Nick">
        <input type="number" id="budgetInput" value="2000" placeholder="Počáteční budget">
        <div class="label">Počet soupeřů:</div>
        <select id="botCount">
            <option value="1">1 Soupeř</option>
            <option value="2">2 Soupeři</option>
            <option value="3">3 Soupeři</option>
        </select>
        <button onclick="initGame()" class="btn-success">ZAČÍT HRÁT</button>
        <button onclick="location.href='index.html'" class="btn-alt">ZPĚT NA LOGIN</button>
    </div>

    <div id="gameScreen" class="game-screen hidden">
        <div class="wallet-info">Můj Budget: <span id="userBudget">0</span> TC</div>
        <div class="pot-box">Bank: <span id="potAmount">0</span> TC</div>
        
        <div id="playerArea" style="display: flex; justify-content: center; flex-wrap: wrap;"></div>

        <div id="controls">
            <input type="number" id="betInput" placeholder="Sázka">
            <div style="display: flex; gap: 5px;">
                <button onclick="playerAction('bet')" class="btn-success">Vsadit</button>
                <button onclick="playerAction('allin')" class="btn-success">All-In</button>
                <button onclick="playerAction('fold')" class="btn-danger">Pas</button>
            </div>
            <button id="btnNext" onclick="nextRound()" class="btn-alt hidden">DALŠÍ KOLO</button>
            <button onclick="location.reload()" class="btn-alt" style="margin-top: 15px;">UKONČIT HRU</button>
        </div>

        <div id="log"></div>
    </div>
</div>

<script>
    const IMAGE_URLS = {
        "7_K": "https://hra-lora.cz/assets/cardsmini/7_d.jpg", "8_K": "https://hra-lora.cz/assets/cardsmini/8_d.jpg", "9_K": "https://hra-lora.cz/assets/cardsmini/9_d.jpg", "10_K": "https://hra-lora.cz/assets/cardsmini/t_d.jpg", "J_K": "https://hra-lora.cz/assets/cardsmini/j_d.jpg", "Q_K": "https://hra-lora.cz/assets/cardsmini/q_d.jpg", "K_K": "https://hra-lora.cz/assets/cardsmini/k_d.jpg", "A_K": "https://hra-lora.cz/assets/cardsmini/a_d.jpg",
        "7_Z": "https://hra-lora.cz/assets/cardsmini/7_s.jpg", "8_Z": "https://hra-lora.cz/assets/cardsmini/8_s.jpg", "9_Z": "https://hra-lora.cz/assets/cardsmini/9_s.jpg", "10_Z": "https://hra-lora.cz/assets/cardsmini/t_s.jpg", "J_Z": "https://hra-lora.cz/assets/cardsmini/j_s.jpg", "Q_Z": "https://hra-lora.cz/assets/cardsmini/q_s.jpg", "K_Z": "https://hra-lora.cz/assets/cardsmini/k_s.jpg", "A_Z": "https://hra-lora.cz/assets/cardsmini/a_s.jpg",
        "7_C": "https://hra-lora.cz/assets/cardsmini/7_h.jpg", "8_C": "https://hra-lora.cz/assets/cardsmini/8_h.jpg", "9_C": "https://hra-lora.cz/assets/cardsmini/9_h.jpg", "10_C": "https://hra-lora.cz/assets/cardsmini/t_h.jpg", "J_C": "https://hra-lora.cz/assets/cardsmini/j_h.jpg", "Q_C": "https://hra-lora.cz/assets/cardsmini/q_h.jpg", "K_C": "https://hra-lora.cz/assets/cardsmini/k_h.jpg", "A_C": "https://hra-lora.cz/assets/cardsmini/a_h.jpg",
        "7_ZL": "https://hra-lora.cz/assets/cardsmini/7_c.jpg", "8_ZL": "https://hra-lora.cz/assets/cardsmini/8_c.jpg", "9_ZL": "https://hra-lora.cz/assets/cardsmini/9_c.jpg", "10_ZL": "https://hra-lora.cz/assets/cardsmini/t_c.jpg", "J_ZL": "https://hra-lora.cz/assets/cardsmini/j_c.jpg", "Q_ZL": "https://hra-lora.cz/assets/cardsmini/q_c.jpg", "K_ZL": "https://hra-lora.cz/assets/cardsmini/k_c.jpg", "A_ZL": "https://hra-lora.cz/assets/cardsmini/a_c.jpg",
        "BACK": "https://hra-lora.cz/assets/cardsmini/back.jpg" 
    };

    const cardKeys = Object.keys(IMAGE_URLS).filter(k => k !== "BACK");
    
    const getVal = (k) => {
        let v = k.split('_')[0].toLowerCase();
        if(v === 't') return 10;
        if(v === 'j') return 11;
        if(v === 'q') return 12;
        if(v === 'k') return 13;
        if(v === 'a') return 14;
        return parseInt(v);
    };

    let gameState = { players: [], pot: 0, active: false, lastBet: 0 };
    const botNames = ["PUKATOR", "HOKEJKA88", "LAPAČ"];

    function initGame() {
        const nick = document.getElementById('nickInput').value || "Host";
        const budget = parseInt(document.getElementById('budgetInput').value) || 2000;
        const bots = parseInt(document.getElementById('botCount').value);

        gameState.players = [{ name: nick.toUpperCase(), budget: budget, card: '', isBot: false, folded: false }];
        for(let i=0; i<bots; i++) {
            gameState.players.push({ name: botNames[i], budget: budget, card: '', isBot: true, folded: false });
        }

        document.getElementById('setupScreen').classList.add('hidden');
        document.getElementById('gameScreen').classList.remove('hidden');
        nextRound();
    }

    function nextRound() {
        gameState.active = true;
        gameState.pot = 0;
        document.getElementById('potAmount').innerText = "0";
        document.getElementById('btnNext').classList.add('hidden');
        document.getElementById('log').innerHTML = "Kolo začalo.";
        document.getElementById('userBudget').innerText = gameState.players[0].budget;

        gameState.players.forEach(p => {
            p.card = cardKeys[Math.floor(Math.random()*cardKeys.length)];
            p.folded = false;
        });

        renderPlayers(false);
    }

    function renderPlayers(reveal) {
        const area = document.getElementById('playerArea');
        area.innerHTML = "";
        gameState.players.forEach(p => {
            let img = (reveal || !p.isBot) ? IMAGE_URLS[p.card] : IMAGE_URLS["BACK"];
            area.innerHTML += `
                <div class="player-slot">
                    <div class="label">${p.name}</div>
                    <img src="${img}" class="card-img">
                    <div class="label" style="color: #ef4444; margin-top:5px;">${p.folded ? 'PAS' : ''}</div>
                </div>
            `;
        });
    }

    function playerAction(type) {
        if(!gameState.active) return;
        let me = gameState.players[0];
        let bet = 0;

        if(type === 'fold') { 
            me.folded = true; 
            evaluate(); 
            return; 
        }

        if(type === 'allin') {
            bet = me.budget;
        } else {
            bet = parseInt(document.getElementById('betInput').value);
        }

        if(isNaN(bet) || bet <= 0 || bet > me.budget) {
            return alert("Neplatná hodnota sázky!");
        }

        gameState.lastBet = bet;
        me.budget -= bet;
        
        let activeBots = 0;
        gameState.players.forEach(p => {
            if(p.isBot) {
                p.budget -= bet; // Simulace, že boti vždy dorovnají
                activeBots++;
            }
        });

        gameState.pot = bet * (activeBots + 1);
        document.getElementById('potAmount').innerText = gameState.pot;
        document.getElementById('userBudget').innerText = me.budget;
        evaluate();
    }

    function evaluate() {
        gameState.active = false;
        renderPlayers(true);
        let me = gameState.players[0];
        
        if(me.folded) {
            addLog("Položil jsi to.");
        } else {
            let myVal = getVal(me.card);
            let botVals = gameState.players.filter(p => p.isBot).map(p => getVal(p.card));
            let maxBot = Math.max(...botVals);

            if(myVal > maxBot) {
                me.budget += gameState.pot;
                addLog(`VYHRÁL JSI ${gameState.pot} TC!`);
            } else if(myVal === maxBot) {
                me.budget += gameState.lastBet;
                addLog("REMÍZA! Sázka vrácena.");
            } else {
                addLog("Prohrál jsi.");
            }
        }

        document.getElementById('userBudget').innerText = me.budget;
        document.getElementById('btnNext').classList.remove('hidden');
        document.getElementById('betInput').value = "";

        if(me.budget <= 0) {
            addLog("BANKROT! Hra končí.");
            document.getElementById('btnNext').onclick = () => location.reload();
            document.getElementById('btnNext').innerText = "RESTART";
        }
    }

    function addLog(m) { 
        const logBox = document.getElementById('log');
        logBox.innerHTML = `<div>> ${m}</div>` + logBox.innerHTML; 
    }
</script>
</body>
</html>
