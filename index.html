<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HCW - Higher Card Wins</title>

    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/15661/15661093.png">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/15661/15661093.png">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">

    <style>
        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            background: #0b0f1a; 
            color: #e2e8f0; 
            text-align: center; 
            margin: 0; 
            padding: 10px; 
        }

        .container { max-width: 500px; margin: 0 auto; }

        h1 { color: #3b82f6; text-transform: uppercase; letter-spacing: 2px; margin: 15px 0; }

        .auth-box, .menu-box, .game-area { 
            background: #161e2d; 
            padding: 20px; 
            border-radius: 12px; 
            border: 1px solid #2d3748; 
            margin-top: 15px;
        }

        .wallet { 
            display: flex; 
            justify-content: space-around; 
            background: #1e293b; 
            padding: 12px; 
            border-radius: 10px; 
            margin-bottom: 15px;
            border-bottom: 2px solid #3b82f6;
        }

        .val { font-weight: bold; color: #6ee7b7; font-size: 18px; }
        .label { font-size: 11px; color: #94a3b8; text-transform: uppercase; }

        input { 
            width: 100%; 
            padding: 12px; 
            margin: 8px 0; 
            border-radius: 8px; 
            border: 1px solid #2d3748; 
            background: #0f172a; 
            color: white; 
            box-sizing: border-box; 
            font-size: 16px;
        }

        button { 
            width: 100%; 
            padding: 14px; 
            border: none; 
            border-radius: 8px; 
            background: #3b82f6; 
            color: white; 
            font-weight: bold; 
            cursor: pointer; 
            margin-top: 8px; 
            font-size: 15px;
        }

        .btn-success { background: #059669; }
        .btn-danger { background: #991b1b; }
        .btn-alt { background: #334155; }

        /* OPRAVA KARET - NEKROPOVAT */
        .card-img {
            width: 90px;
            height: auto;
            border-radius: 4px;
            border: 1px solid #4a5568;
            background: #2d3748;
            display: block;
            margin: 0 auto;
        }

        .player-slot { margin: 5px; display: inline-block; vertical-align: top; width: 100px; }
        
        .pot-box { 
            font-size: 22px; 
            color: #fbbf24; 
            font-weight: bold; 
            padding: 10px; 
            border: 1px dashed #fbbf24; 
            margin-bottom: 15px; 
        }

        #log {
            background: rgba(0,0,0,0.3);
            padding: 10px;
            border-radius: 6px;
            margin-top: 15px;
            font-size: 13px;
            text-align: left;
            max-height: 80px;
            overflow-y: auto;
            color: #cbd5e1;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="container">
    <h1>HCW</h1>

    <div id="authSection" class="auth-box">
        <input type="email" id="email" placeholder="E-mail">
        <input type="password" id="pass" placeholder="Heslo">
        <button onclick="window.login()" class="btn-success">PŘIHLÁSIT SE</button>
        <button onclick="location.href='guest.html'" class="btn-alt">HRÁT JAKO HOST</button>
    </div>

    <div id="mainWrapper" class="hidden">
        <div class="wallet">
            <div><span class="label">Moje TC</span><span id="txtTC" class="val">0</span></div>
            <div><span class="label">Moje Coiny</span><span id="txtCoins" class="val">0</span></div>
        </div>

        <div id="mainMenu" class="menu-box">
            <button onclick="window.showGame()" class="btn-success" style="font-size: 18px;">VSTOUPIT DO HRY</button>
            <hr style="border: 0; border-top: 1px solid #2d3748; margin: 15px 0;">
            <div class="label" style="margin-bottom: 5px;">Směnárna (1 TC = 20 C)</div>
            <input type="number" id="exAmount" placeholder="Množství TC k převodu">
            <div style="display: flex; gap: 5px;">
                <button onclick="window.exchange('toCoins')" class="btn-alt">TC na Coiny</button>
                <button onclick="window.exchange('toTC')" class="btn-alt">Coiny na TC</button>
            </div>
            <button onclick="window.logout()" class="btn-danger" style="margin-top: 20px; font-size: 12px;">ODHLÁSIT SE</button>
        </div>
    </div>

    <div id="gameArea" class="game-area hidden">
        <div class="pot-box">Bank: <span id="potAmount">0</span> C</div>
        
        <div id="table" style="display: flex; justify-content: center; flex-wrap: wrap;"></div>

        <div id="gameControls">
            <input type="number" id="betInput" placeholder="Sázka v Coinech">
            <div style="display: flex; gap: 5px;">
                <button onclick="window.gameAction('bet')" class="btn-success">Vsadit</button>
                <button onclick="window.gameAction('allin')" class="btn-success">All-In</button>
                <button onclick="window.gameAction('fold')" class="btn-danger">Pas</button>
            </div>
            <button id="btnNext" onclick="window.nextRound()" class="btn-alt hidden">DALŠÍ KOLO</button>
            <button onclick="window.closeGame()" class="btn-alt" style="margin-top: 15px;">ZPĚT DO MENU</button>
        </div>

        <div id="log"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyC2xPE4YnIanTiRgrwsoXgoclTyOq0BraE",
        authDomain: "tipovacka-fce0e.firebaseapp.com",
        databaseURL: "https://tipovacka-fce0e-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "tipovacka-fce0e"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    let currentUser = null;
    let userData = { balance: 0, coins: 0 };
    let gameState = { active: false, pot: 0, players: [], lastBet: 0 };

    const IMAGE_URLS = {
        "7_K": "https://hra-lora.cz/assets/cardsmini/7_d.jpg", "8_K": "https://hra-lora.cz/assets/cardsmini/8_d.jpg", "9_K": "https://hra-lora.cz/assets/cardsmini/9_d.jpg", "10_K": "https://hra-lora.cz/assets/cardsmini/t_d.jpg", "J_K": "https://hra-lora.cz/assets/cardsmini/j_d.jpg", "Q_K": "https://hra-lora.cz/assets/cardsmini/q_d.jpg", "K_K": "https://hra-lora.cz/assets/cardsmini/k_d.jpg", "A_K": "https://hra-lora.cz/assets/cardsmini/a_d.jpg",
        "7_Z": "https://hra-lora.cz/assets/cardsmini/7_s.jpg", "8_Z": "https://hra-lora.cz/assets/cardsmini/8_s.jpg", "9_Z": "https://hra-lora.cz/assets/cardsmini/9_s.jpg", "10_Z": "https://hra-lora.cz/assets/cardsmini/t_s.jpg", "J_Z": "https://hra-lora.cz/assets/cardsmini/j_s.jpg", "Q_Z": "https://hra-lora.cz/assets/cardsmini/q_s.jpg", "K_Z": "https://hra-lora.cz/assets/cardsmini/k_s.jpg", "A_Z": "https://hra-lora.cz/assets/cardsmini/a_s.jpg",
        "7_C": "https://hra-lora.cz/assets/cardsmini/7_h.jpg", "8_C": "https://hra-lora.cz/assets/cardsmini/8_h.jpg", "9_C": "https://hra-lora.cz/assets/cardsmini/9_h.jpg", "10_C": "https://hra-lora.cz/assets/cardsmini/t_h.jpg", "J_C": "https://hra-lora.cz/assets/cardsmini/j_h.jpg", "Q_C": "https://hra-lora.cz/assets/cardsmini/q_h.jpg", "K_C": "https://hra-lora.cz/assets/cardsmini/k_h.jpg", "A_C": "https://hra-lora.cz/assets/cardsmini/a_h.jpg",
        "7_ZL": "https://hra-lora.cz/assets/cardsmini/7_c.jpg", "8_ZL": "https://hra-lora.cz/assets/cardsmini/8_c.jpg", "9_ZL": "https://hra-lora.cz/assets/cardsmini/9_c.jpg", "10_ZL": "https://hra-lora.cz/assets/cardsmini/t_c.jpg", "J_ZL": "https://hra-lora.cz/assets/cardsmini/j_c.jpg", "Q_ZL": "https://hra-lora.cz/assets/cardsmini/q_c.jpg", "K_ZL": "https://hra-lora.cz/assets/cardsmini/k_c.jpg", "A_ZL": "https://hra-lora.cz/assets/cardsmini/a_c.jpg",
        "BACK": "https://hra-lora.cz/assets/cardsmini/back.jpg" 
    };

    const cardKeys = Object.keys(IMAGE_URLS).filter(k => k !== "BACK");
    
    const getVal = (k) => {
        let v = k.split('_')[0].toLowerCase();
        if(v === 't') return 10;
        if(v === 'j') return 11;
        if(v === 'q') return 12;
        if(v === 'k') return 13;
        if(v === 'a') return 14;
        return parseInt(v);
    };

    window.login = () => {
        const emailVal = document.getElementById('email').value;
        const passVal = document.getElementById('pass').value;
        signInWithEmailAndPassword(auth, emailVal, passVal).catch(e => alert(e.message));
    };
    
    window.logout = () => signOut(auth);

    onAuthStateChanged(auth, u => {
        currentUser = u;
        if (u) {
            onValue(ref(db, `tips/${u.uid}`), snap => {
                userData = snap.val() || { balance: 0, coins: 0 };
                document.getElementById('txtTC').innerText = userData.balance || 0;
                document.getElementById('txtCoins').innerText = userData.coins || 0;
                document.getElementById('authSection').classList.add('hidden');
                document.getElementById('mainWrapper').classList.remove('hidden');
            });
        } else {
            document.getElementById('authSection').classList.remove('hidden');
            document.getElementById('mainWrapper').classList.add('hidden');
            document.getElementById('gameArea').classList.add('hidden');
        }
    });

    window.exchange = (type) => {
        const amt = parseInt(document.getElementById('exAmount').value);
        if(!amt || amt <= 0) return alert("Zadej platnou hodnotu pro směnu!");
        
        let newB, newC;
        if(type === 'toCoins') {
            if(userData.balance < amt) return alert("Málo TC!");
            newB = userData.balance - amt;
            newC = (userData.coins || 0) + (amt * 20);
        } else {
            if(userData.coins < (amt * 20)) return alert("Málo Coinů!");
            newB = userData.balance + amt;
            newC = userData.coins - (amt * 20);
        }
        update(ref(db, `tips/${currentUser.uid}`), { balance: newB, coins: newC });
    };

    window.showGame = () => {
        document.getElementById('mainMenu').classList.add('hidden');
        document.getElementById('gameArea').classList.remove('hidden');
        window.nextRound();
    };

    window.closeGame = () => {
        document.getElementById('gameArea').classList.add('hidden');
        document.getElementById('mainMenu').classList.remove('hidden');
    };

    window.nextRound = () => {
        gameState.active = true;
        gameState.pot = 0;
        document.getElementById('potAmount').innerText = "0";
        document.getElementById('btnNext').classList.add('hidden');
        document.getElementById('gameControls').classList.remove('hidden');
        document.getElementById('log').innerHTML = "Nové kolo rozdané.";

        gameState.players = [
            { name: "TY", card: cardKeys[Math.floor(Math.random()*cardKeys.length)], isBot: false, folded: false },
            { name: "PUKATOR", card: cardKeys[Math.floor(Math.random()*cardKeys.length)], isBot: true, folded: false },
            { name: "HOKEJKA88", card: cardKeys[Math.floor(Math.random()*cardKeys.length)], isBot: true, folded: false }
        ];
        render(false);
    };

    function render(reveal) {
        const table = document.getElementById('table');
        table.innerHTML = "";
        gameState.players.forEach(p => {
            let img = (reveal || !p.isBot) ? IMAGE_URLS[p.card] : IMAGE_URLS["BACK"];
            table.innerHTML += `
                <div class="player-slot">
                    <div class="label" style="margin-bottom:5px">${p.name}</div>
                    <img src="${img}" class="card-img">
                    <div class="label" style="margin-top:5px; color: #ef4444;">${p.folded ? 'PAS' : ''}</div>
                </div>
            `;
        });
    }

    window.gameAction = (type) => {
        if(!gameState.active) return;
        
        let bet = 0;
        if(type === 'fold') {
            if(userData.coins < 20) return alert("Nemáš ani 20 coinů na Pas!");
            gameState.players[0].folded = true;
            addLog("Položil jsi karty (-20 C).");
            update(ref(db, `tips/${currentUser.uid}`), { coins: userData.coins - 20 })
                .then(() => evaluate());
            return;
        }

        if(type === 'allin') {
            bet = userData.coins;
        } else {
            bet = parseInt(document.getElementById('betInput').value);
        }

        if(isNaN(bet) || bet <= 0 || bet > userData.coins) {
            return alert("Neplatná hodnota sázky!");
        }

        gameState.lastBet = bet;
        gameState.pot = bet * 3; 
        
        update(ref(db, `tips/${currentUser.uid}`), { coins: userData.coins - bet })
            .then(() => {
                document.getElementById('potAmount').innerText = gameState.pot;
                evaluate();
            });
    };

    function evaluate() {
        gameState.active = false;
        render(true);
        
        if(gameState.players[0].folded) {
            addLog("Prohrál jsi (vzdal ses).");
        } else {
            let myVal = getVal(gameState.players[0].card);
            let b1Val = getVal(gameState.players[1].card);
            let b2Val = getVal(gameState.players[2].card);
            let maxBot = Math.max(b1Val, b2Val);

            if(myVal > maxBot) {
                let win = gameState.pot;
                addLog(`VYHRÁL JSI ${win} C!`);
                update(ref(db, `tips/${currentUser.uid}`), { coins: userData.coins + win });
            } else if(myVal === maxBot) {
                addLog("REMÍZA! Sázka vrácena.");
                update(ref(db, `tips/${currentUser.uid}`), { coins: userData.coins + gameState.lastBet });
            } else {
                addLog("Prohrál jsi.");
            }
        }

        document.getElementById('btnNext').classList.remove('hidden');
        document.getElementById('betInput').value = "";
    }

    function addLog(m) { 
        const logBox = document.getElementById('log');
        logBox.innerHTML = `<div>> ${m}</div>` + logBox.innerHTML; 
    }
</script>
</body>
</html>
